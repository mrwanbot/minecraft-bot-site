<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center zoom">

  <div class="glass small-box">

    <img src="assets/logo.png" class="logo small">

    <h2>Login</h2>

    <button class="btn" onclick="googleLogin()">Login with Google</button>

    <button class="btn save" onclick="saveLogin()">Save Login</button>

    <p class="info">لازم تضغط حفظ لتفعيل الدخول التلقائي</p>

  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden zoom">

  <div class="glass header">
    <img src="assets/logo.png" class="logo tiny">
    <h3>Server Setup Wizard</h3>
  </div>

  <div class="glass card">

    <h4>Step 1 of 4 -- Server Info</h4>

    <p class="info">
      من أين تحصل على IP السيرفر:<br>
      My Servers → Aternos → اختر السيرفر → Connect<br>
      مثال: myserver.aternos.me:25565
    </p>

    <label>Server IP</label>
    <input type="text" placeholder="Enter Server IP">

    <label>Port (default 25565)</label>
    <input type="number" placeholder="25565">

    <button class="btn">Ping</button>

    <p class="status">لم يتم الاختبار بعد</p>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
