<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Panel</title>

  <!-- Cairo Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="glass-box">
    <img src="assets/logo.png" class="logo">

    <h1>Minecraft Panel</h1>
    <p>Login with Google</p>

    <button class="btn" onclick="googleLogin()">🔐 Login with Google</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <header class="glass-header">
    <img src="assets/logo.png" class="logo-small">
    <h2>Minecraft Panel</h2>
  </header>

  <div class="container">

    <div class="glass-card">
      <h3>👋 Welcome</h3>
      <p id="user"></p>
    </div>

    <div class="glass-card">
      <h3>Control</h3>

      <button class="btn green" onclick="startBot()">Start</button>
      <button class="btn red" onclick="stopBot()">Stop</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
