<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar glass">
  <img src="assets/logo.png" class="logo">
  <span>Minecraft Server Panel</span>
</div>

<div class="container">

  <div class="step-title">Step 1 of 4 — Server Information</div>

  <div class="card glass">

    <p class="desc">
      من أين تحصل على IP السيرفر:<br><br>
      👉 My Servers → Aternos → اختر السيرفر → Connect<br>
      مثال: myserver.aternos.me:25565
    </p>

    <label>Server Address (IP)</label>
    <input placeholder="example: myserver.aternos.me">

    <label>Port</label>
    <input placeholder="25565">

    <div class="row">
      <button class="btn">Ping</button>
      <button class="btn ghost">Not Tested</button>
    </div>

  </div>

</div>

</body>
</html>
