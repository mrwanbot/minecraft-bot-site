<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Hosting Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 PAGE 1: LOGIN -->
<div id="loginPage" class="center">

  <div class="glass box">

    <img src="assets/logo.png" class="logo">

    <h2>تسجيل الدخول</h2>

    <input id="password" type="password" placeholder="أدخل كلمة السر">

    <button class="btn" onclick="login()">دخول</button>
    <button class="btn ghost" onclick="save()">حفظ الدخول</button>

    <p class="info">هذه الصفحة للدخول فقط</p>

  </div>

</div>

<!-- 🎮 PAGE 2: DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="topbar glass">
    <img src="assets/logo.png" class="logo small">
    <span>لوحة استضافة السيرفر</span>
  </div>

  <div class="container">

    <div class="step">الخطوة 1 من 4</div>
    <div class="title">بيانات السيرفر</div>

    <div class="card glass">

      <p class="desc">
        للحصول على IP السيرفر:<br><br>
        My Servers → Aternos → Connect<br>
        example: myserver.aternos.me:25565
      </p>

      <label>عنوان السيرفر (IP)</label>
      <input placeholder="server ip">

      <label>Port</label>
      <input placeholder="25565">

      <button class="btn">Ping Server</button>

      <div class="status">الحالة: لم يتم الاختبار</div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
