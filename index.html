<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="center">

  <div class="glass box">

    <!-- 🔥 LOGO -->
    <img src="assets/logo.png" class="logo">

    <h2>تسجيل الدخول</h2>

    <input id="password" type="password" placeholder="أدخل كلمة السر">

    <button class="btn" onclick="login()">دخول</button>
    <button class="btn ghost" onclick="save()">حفظ الدخول</button>

  </div>

</div>

<script>
const PASSWORD = "151525";

/* إذا محفوظ دخول يدخل مباشرة */
window.onload = function () {
  if (localStorage.getItem("loggedIn") === "true") {
    window.location.href = "panel.html";
  }
};

/* تسجيل دخول */
function login() {
  const p = document.getElementById("password").value;
  const saved = localStorage.getItem("savedPass");

  if (p === PASSWORD || p === saved) {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "panel.html";
  } else {
    alert("كلمة السر خطأ ❌");
  }
}

/* حفظ دخول */
function save() {
  const p = document.getElementById("password").value;

  if (p === PASSWORD) {
    localStorage.setItem("savedPass", p);
    localStorage.setItem("loggedIn", "true");
    alert("تم الحفظ ✔");
    window.location.href = "panel.html";
  } else {
    alert("كلمة السر غير صحيحة");
  }
}
</script>

</body>
</html>
