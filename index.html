<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الاستضافة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">

  <div class="glass box">

    <h2>تسجيل الدخول</h2>

    <input id="pass" type="password" placeholder="أدخل كلمة السر">

    <button class="btn" onclick="login()">دخول</button>
    <button class="btn ghost" onclick="save()">حفظ</button>

  </div>

</div>

<!-- DASHBOARD -->
<div id="panel" class="hidden">

  <div class="topbar glass">
    <img src="assets/logo.png" class="logo">
    <span>لوحة استضافة السيرفر</span>
  </div>

  <div class="container">

    <div class="step">الخطوة 1 من 4</div>
    <div class="title">بيانات السيرفر</div>

    <div class="card glass">

      <p class="desc">
        للحصول على IP السيرفر:<br>
        My Servers → Aternos → Connect<br>
        مثال: myserver.aternos.me:25565
      </p>

      <label>IP السيرفر</label>
      <input placeholder="myserver.aternos.me">

      <label>البورت</label>
      <input placeholder="25565">

      <button class="btn">Ping</button>

      <div class="status">الحالة: لم يتم الاختبار</div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
