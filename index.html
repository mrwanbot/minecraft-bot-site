ؤ<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar glass">
  <img src="assets/logo.png" class="logo">
  <span>Minecraft Panel</span>
</div>

<!-- STEP -->
<div class="container">

  <div class="step">Step 1 of 4</div>
  <div class="title">Server Information</div>

  <div class="card glass">

    <p class="desc">
      من أين تحصل على IP السيرفر:<br><br>
      My Servers → Aternos → Connect<br>
      example: myserver.aternos.me:25565
    </p>

    <label>Server IP</label>
    <input placeholder="Enter IP">

    <label>Port</label>
    <input placeholder="25565">

    <button class="btn">Ping Server</button>

    <div class="status">Status: Not tested</div>

  </div>

</div>

</body>
</html>
