<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الاستضافة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar glass">
  <img src="assets/logo.png" class="logo">
  <span>لوحة استضافة ماينكرافت</span>
</div>

<!-- STEP SYSTEM -->
<div class="container">

  <div class="step">الخطوة 1 من 4</div>
  <div class="title">بيانات السيرفر</div>

  <div class="card glass">

    <p class="desc">
      📌 طريقة الحصول على IP:<br><br>
      My Servers → Aternos → Connect<br>
      مثال: myserver.aternos.me:25565
    </p>

    <label>عنوان السيرفر (IP)</label>
    <input type="text" placeholder="myserver.aternos.me">

    <label>البورت</label>
    <input type="number" placeholder="25565">

    <button class="btn">اختبار الاتصال (Ping)</button>

    <div class="status">الحالة: لم يتم الاختبار بعد</div>

    <div class="row">
      <button class="btn ghost">Ping</button>
      <button class="btn ghost">غير متصل</button>
    </div>

  </div>

</div>

</body>
</html>
