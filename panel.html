<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar glass">
  <img src="assets/logo.png" class="logo small">
  <span>لوحة السيرفر</span>
  <button class="btn ghost small" onclick="logout()">خروج</button>
</div>

<div class="container">

  <div class="step">الخطوة 1 من 4</div>
  <div class="title">بيانات السيرفر</div>

  <div class="card glass">

    <p class="desc">
      أدخل IP + Port بشكل صحيح
    </p>

    <label>IP</label>
    <input id="ip" placeholder="myserver.aternos.me">

    <label>Port</label>
    <input id="port" placeholder="25565">

    <button class="btn" onclick="pingServer()">Ping Server</button>

    <div class="status" id="status">الحالة: لم يتم الاختبار</div>

  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}

/* 🔥 Ping محسن */
async function pingServer() {

  const ip = document.getElementById("ip").value.trim();
  const port = document.getElementById("port").value.trim();

  const status = document.getElementById("status");

  if (!ip) {
    alert("أدخل IP");
    return;
  }

  status.innerText = "جاري الفحص... ⏳";

  try {
    const url = `https://api.mcsrvstat.us/3/${ip}:${port}`;
    const res = await fetch(url);
    const data = await res.json();

    console.log("SERVER DATA:", data);

    /* 🔥 تحسين الدقة */
    if (data && data.ip) {

      if (data.online === true) {
        status.innerText =
          `🟢 Online | Players: ${data.players?.online ?? 0}`;
      } else {
        status.innerText = "🔴 Offline";
      }

    } else {
      status.innerText = "🔴 لا يمكن التحقق من السيرفر";
    }

  } catch (e) {
    status.innerText = "خطأ في الاتصال ❌";
  }
}
</script>

</body>
</html>
