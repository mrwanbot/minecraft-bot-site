<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الاستضافة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar glass">
  <img src="assets/logo.png" class="logo small">
  <span>لوحة استضافة السيرفر</span>
  <button class="btn ghost small" onclick="logout()">خروج</button>
</div>

<div class="container">

  <div class="step">الخطوة 1 من 4</div>
  <div class="title">بيانات السيرفر</div>

  <div class="card glass">

    <p class="desc">
      My Servers → Aternos → Connect<br>
      example: myserver.aternos.me:25565
    </p>

    <label>IP السيرفر</label>
    <input id="ip" placeholder="server ip">

    <label>Port</label>
    <input id="port" placeholder="25565">

    <button class="btn" onclick="pingServer()">Ping Server</button>

    <div class="status" id="status">الحالة: لم يتم الاختبار</div>

  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}

/* 🔥 Ping حقيقي */
async function pingServer() {

  const ip = document.getElementById("ip").value;
  const port = document.getElementById("port").value;

  const status = document.getElementById("status");

  if (!ip) {
    alert("أدخل IP السيرفر");
    return;
  }

  status.innerText = "جاري الفحص... ⏳";

  try {
    const res = await fetch(`https://api.mcsrvstat.us/2/${ip}:${port}`);
    const data = await res.json();

    if (data.online) {
      status.innerText = `🟢 Online | Players: ${data.players.online}`;
    } else {
      status.innerText = "🔴 Offline";
    }

  } catch (e) {
    status.innerText = "خطأ في الاتصال ❌";
  }
}
</script>

</body>
</html>
